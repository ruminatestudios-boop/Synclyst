<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All connected | Listing Flow | AuraLink AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], serif: ['Source Serif 4', 'Georgia', 'serif'] },
        },
      },
    };
  </script>
  <style>
    .step-segment { width: 8px; height: 4px; border-radius: 2px; background: #e4e4e7; }
    .step-segment.filled { background: #18181b; }
  </style>
</head>
<body class="min-h-screen bg-zinc-50 font-sans text-zinc-900 antialiased">
  <div class="max-w-md mx-auto min-h-screen flex flex-col">
    <header class="flex items-center justify-between px-5 pt-6 pb-4 shrink-0">
      <span class="w-10 h-10" aria-hidden="true"></span>
      <span class="invisible text-sm">Next</span>
    </header>

    <main class="flex-1 px-5 pb-6 overflow-auto flex flex-col items-center">
      <div class="w-16 h-16 rounded-full bg-emerald-500 flex items-center justify-center mb-4 shrink-0">
        <span class="text-white text-3xl font-bold">✓</span>
      </div>
      <h1 class="font-serif text-xl font-bold text-zinc-900 mb-1 text-center">All connected!</h1>
      <p class="text-center text-sm text-zinc-500 mb-6" id="done-subtitle">3 stores are ready. Now review your listing before it goes live.</p>

      <div class="w-full space-y-3 mb-5" id="done-stores-list"></div>

      <div class="rounded-xl bg-zinc-100 border border-zinc-200 p-3 w-full mb-6">
        <p class="text-xs text-zinc-600">These connections are saved. Next listing you skip this step entirely.</p>
      </div>
    </main>

    <div class="p-5 pt-4 border-t border-zinc-200 shrink-0 bg-zinc-50">
      <div class="flex items-center justify-center gap-1 mb-4">
        <span class="step-segment filled"></span>
        <span class="step-segment filled"></span>
        <span class="step-segment filled"></span>
        <span class="step-segment filled"></span>
        <span class="step-segment filled"></span>
        <span class="step-segment"></span>
      </div>
      <a href="/flow-verifying.html" class="block w-full py-3.5 rounded-2xl bg-zinc-900 text-white font-semibold text-[15px] border border-zinc-800 text-center no-underline">
        Review listing before posting
      </a>
    </div>
  </div>
  <script>
    document.addEventListener('keydown', function(e) {
      if (e.key !== 'ArrowLeft') return;
      if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement && document.activeElement.tagName || '')) return;
      e.preventDefault();
      history.back();
    });
  </script>
  <script>
    (function() {
      var STORAGE_KEY = 'auralink_selected_marketplaces';
      var meta = {
        tiktok_shop: { name: 'TikTok Shop', domain: 'tiktok.com', letter: 'T' },
        amazon: { name: 'Amazon', domain: 'amazon.com', letter: 'A' },
        shopify: { name: 'Shopify', domain: 'shopify.com', letter: 'S' },
        ebay: { name: 'eBay', domain: 'ebay.com', letter: 'E' },
        etsy: { name: 'Etsy', domain: 'etsy.com', letter: 'E' },
        depop: { name: 'Depop', domain: 'depop.com', letter: 'D' },
        walmart: { name: 'Walmart', domain: 'walmart.com', letter: 'W' },
        poshmark: { name: 'Poshmark', domain: 'poshmark.com', letter: 'P' },
        mercari: { name: 'Mercari', domain: 'mercari.com', letter: 'M' },
        vinted: { name: 'Vinted', domain: 'vinted.com', letter: 'V' }
      };
      function loadSelected() {
        try {
          var raw = sessionStorage.getItem(STORAGE_KEY);
          if (raw) { var arr = JSON.parse(raw); if (Array.isArray(arr) && arr.length > 0) return arr; }
        } catch (e) {}
        return ['amazon', 'shopify'];
      }
      var selected = loadSelected();
      var sub = document.getElementById('done-subtitle');
      if (sub) sub.textContent = selected.length + ' store' + (selected.length === 1 ? ' is' : 's are') + ' ready. Now review your listing before it goes live.';
      var container = document.getElementById('done-stores-list');
      if (container) {
        container.innerHTML = '';
        selected.forEach(function(id) {
          var m = meta[id] || { name: id, domain: '', letter: id.charAt(0).toUpperCase() };
          var row = document.createElement('div');
          row.className = 'rounded-xl bg-white border border-zinc-200 p-4 flex items-center justify-between';
          var logoUrl = m.domain ? 'https://www.google.com/s2/favicons?domain=' + m.domain + '&sz=128' : '';
          row.innerHTML = '<div class="flex items-center gap-3">' +
            '<span class="w-10 h-10 rounded-xl bg-zinc-100 border border-zinc-200 flex items-center justify-center overflow-hidden shrink-0">' +
              (logoUrl ? '<img src="' + logoUrl + '" alt="" class="w-6 h-6 object-contain" onerror="this.style.display=\'none\';var n=this.nextElementSibling;n&&n.classList.remove(\'hidden\');" />' +
              '<span class="text-zinc-600 text-sm font-bold hidden">' + m.letter + '</span>' : '<span class="text-zinc-600 text-sm font-bold">' + m.letter + '</span>') +
            '</span>' +
            '<p class="font-semibold text-zinc-900">' + m.name + '</p></div>' +
            '<span class="text-xs font-semibold px-2.5 py-1 rounded-full bg-emerald-50 border border-emerald-200 text-emerald-800">Connected ✓</span>';
          container.appendChild(row);
        });
      }
    })();
  </script>
</body>
</html>
