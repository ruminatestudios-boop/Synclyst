<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billing | SyncLyst</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], serif: ['Source Serif 4', 'Georgia', 'serif'] },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-zinc-50 font-sans text-zinc-900 antialiased">
  <div class="max-w-md mx-auto min-h-screen flex flex-col">
    <header class="flex items-center justify-between px-5 pt-6 pb-4 shrink-0 bg-zinc-50 border-b border-zinc-100">
      <a href="settings.html" class="flex items-center gap-2 text-zinc-900 no-underline">
        <span class="text-lg">←</span>
        <span class="font-semibold">Settings</span>
      </a>
      <h1 class="font-serif text-lg font-bold text-zinc-900">Billing</h1>
      <span class="w-14"></span>
    </header>

    <main class="flex-1 px-5 py-4 overflow-auto">
      <p class="text-[11px] font-semibold uppercase tracking-wider text-zinc-500 mb-2">Payment method</p>
      <div class="rounded-xl bg-white border border-zinc-200 p-4 mb-6">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-7 rounded bg-zinc-800 flex items-center justify-center text-white text-[10px] font-bold">VISA</div>
            <div>
              <p class="text-sm font-semibold text-zinc-900">•••• 4242</p>
              <p class="text-xs text-zinc-500">Expires 12/28</p>
            </div>
          </div>
          <button type="button" class="text-sm font-medium text-zinc-600 hover:text-zinc-900">Update</button>
        </div>
      </div>

      <p class="text-[11px] font-semibold uppercase tracking-wider text-zinc-500 mb-2">Invoices</p>
      <div class="rounded-xl bg-white border border-zinc-200 divide-y divide-zinc-100 overflow-hidden mb-6">
        <a href="#" class="flex items-center justify-between px-4 py-3 text-zinc-900 no-underline hover:bg-zinc-50">
          <span class="text-sm font-medium">Feb 2026 · $29.00</span>
          <span class="text-zinc-400">›</span>
        </a>
        <a href="#" class="flex items-center justify-between px-4 py-3 text-zinc-900 no-underline hover:bg-zinc-50">
          <span class="text-sm font-medium">Jan 2026 · $29.00</span>
          <span class="text-zinc-400">›</span>
        </a>
        <a href="#" class="flex items-center justify-between px-4 py-3 text-zinc-900 no-underline hover:bg-zinc-50">
          <span class="text-sm font-medium">Dec 2025 · $29.00</span>
          <span class="text-zinc-400">›</span>
        </a>
      </div>
    </main>
  </div>
</body>
</html>
