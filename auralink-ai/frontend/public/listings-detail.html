<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listing detail | SyncLyst</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], serif: ['Source Serif 4', 'Georgia', 'serif'] },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-zinc-50 font-sans text-zinc-900 antialiased">
  <div class="max-w-md mx-auto min-h-screen flex flex-col">
    <header class="flex items-center justify-between px-5 pt-6 pb-4 shrink-0 bg-zinc-50 border-b border-zinc-100">
      <a href="/listings-all.html" class="flex items-center gap-2 text-zinc-900 no-underline">
        <span class="text-lg">←</span>
        <span class="font-semibold">Listings</span>
      </a>
      <button type="button" class="text-sm font-semibold text-zinc-900">Edit</button>
    </header>

    <main class="flex-1 px-5 pb-6 overflow-auto">
      <!-- Product image -->
      <div class="flex justify-center my-6">
        <div class="w-32 h-32 rounded-2xl bg-zinc-100 border border-zinc-200"></div>
      </div>

      <h1 class="font-serif text-xl font-bold text-zinc-900 text-center mb-1">Sony WH-1000XM5</h1>
      <p class="font-serif text-2xl font-bold text-emerald-700 text-center mb-6">$269.00</p>

      <!-- Platform pills -->
      <div class="flex flex-wrap justify-center gap-2 mb-6">
        <span class="text-[10px] font-semibold px-3 py-1.5 rounded-full bg-emerald-50 border border-emerald-200 text-emerald-800 flex items-center gap-1.5">
          <span>T</span> TikTok — Live
        </span>
        <span class="text-[10px] font-semibold px-3 py-1.5 rounded-full bg-emerald-50 border border-emerald-200 text-emerald-800 flex items-center gap-1.5">
          <span>A</span> Amazon — Live
        </span>
        <span class="text-[10px] font-semibold px-3 py-1.5 rounded-full bg-emerald-50 border border-emerald-200 text-emerald-800 flex items-center gap-1.5">
          <span>S</span> Shopify — Live
        </span>
      </div>

      <!-- Metrics -->
      <div class="flex gap-4 justify-center mb-6">
        <div class="text-center">
          <p class="font-serif text-lg font-bold text-zinc-900">247</p>
          <p class="text-[11px] text-zinc-500">views</p>
        </div>
        <div class="text-center">
          <p class="font-serif text-lg font-bold text-zinc-900">18</p>
          <p class="text-[11px] text-zinc-500">saves</p>
        </div>
        <div class="text-center">
          <p class="font-serif text-lg font-bold text-zinc-900">1.8d</p>
          <p class="text-[11px] text-zinc-500">est. sale</p>
        </div>
      </div>

      <!-- AI suggestion -->
      <div class="rounded-xl bg-zinc-100 border border-zinc-200 p-4 mb-6">
        <p class="text-sm text-zinc-700"><span class="font-semibold text-zinc-900">AI:</span> Listing score 87/100. Consider adding a lifestyle photo to boost conversion.</p>
      </div>

      <!-- Actions -->
      <a href="/flow-3.html" class="block w-full py-3.5 rounded-2xl bg-zinc-900 text-white font-semibold text-[15px] border border-zinc-800 text-center no-underline mb-3">
        Edit listing
      </a>
      <button type="button" class="block w-full py-3 rounded-xl border border-red-200 text-red-600 font-medium text-sm">
        Remove from all stores
      </button>
    </main>
  </div>
</body>
</html>
