<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comp Coach | Listing Flow | SyncLyst</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], serif: ['Source Serif 4', 'Georgia', 'serif'] },
        },
      },
    };
  </script>
  <style>
    .step-segment { width: 8px; height: 4px; border-radius: 2px; background: #e4e4e7; }
    .step-segment.filled { background: #18181b; }
  </style>
</head>
<body class="min-h-screen bg-zinc-50 font-sans text-zinc-900 antialiased">
  <div class="max-w-md mx-auto min-h-screen flex flex-col">
    <header class="flex items-center justify-between px-5 pt-6 pb-4 shrink-0">
      <span class="w-10 h-10" aria-hidden="true"></span>
      <div class="flex items-center gap-1">
        <span class="step-segment filled"></span>
        <span class="step-segment filled"></span>
        <span class="step-segment filled"></span>
        <span class="step-segment"></span>
        <span class="step-segment"></span>
        <span class="step-segment"></span>
      </div>
      <a href="/flow-marketplaces.html" class="text-sm font-semibold text-zinc-900 underline">Next</a>
    </header>

    <main class="flex-1 px-5 pb-6 overflow-auto">
      <!-- Price row -->
      <div class="flex items-center justify-between rounded-xl bg-zinc-100 border border-zinc-200 px-4 py-3 mb-4">
        <div class="flex items-center gap-2">
          <span class="text-[11px] font-semibold uppercase tracking-wider text-zinc-500">Price</span>
          <span class="font-serif text-lg font-bold text-zinc-900">$269</span>
        </div>
        <span class="w-6 h-6 rounded-full bg-zinc-700 flex items-center justify-center text-white text-xs">✓</span>
      </div>

      <!-- Comp Coach card -->
      <div class="rounded-2xl bg-white border border-zinc-200 overflow-hidden mb-4">
        <div class="flex items-center justify-between px-4 py-2.5 bg-zinc-100 border-b border-zinc-200">
          <span class="text-[11px] font-semibold uppercase tracking-wider text-zinc-600">Comp Coach</span>
          <button type="button" class="w-6 h-6 rounded flex items-center justify-center text-zinc-500 text-sm">×</button>
        </div>
        <div class="p-4 space-y-4">
          <div class="flex items-center justify-between text-sm">
            <span class="text-zinc-600">Title</span>
            <span class="font-medium text-zinc-900">90</span>
          </div>
          <div class="h-1.5 bg-zinc-200 rounded-full overflow-hidden">
            <div class="h-full bg-zinc-700 rounded-full" style="width: 90%;"></div>
          </div>
          <div class="flex items-center justify-between text-sm">
            <span class="text-zinc-600">Description</span>
            <span class="font-medium text-zinc-900">62</span>
          </div>
          <div class="h-1.5 bg-zinc-200 rounded-full overflow-hidden">
            <div class="h-full bg-amber-500 rounded-full" style="width: 62%;"></div>
          </div>
          <div class="flex items-center justify-between text-sm">
            <span class="text-zinc-600">SEO Tags</span>
            <span class="font-medium text-zinc-900">78</span>
          </div>
          <div class="h-1.5 bg-zinc-200 rounded-full overflow-hidden">
            <div class="h-full bg-zinc-700 rounded-full" style="width: 78%;"></div>
          </div>
          <p class="text-xs text-zinc-600">Add "LDAC", "multipoint", "Speak-to-Chat" → score goes 62 → 85.</p>
          <div class="flex gap-2">
            <button type="button" class="flex-1 py-2.5 rounded-xl bg-zinc-100 border border-zinc-200 text-sm font-semibold text-zinc-900">Auto-fix description</button>
            <button type="button" class="flex-1 py-2.5 rounded-xl border border-zinc-200 text-sm font-medium text-zinc-600">Skip</button>
          </div>
        </div>
      </div>

      <!-- Price good card -->
      <div class="rounded-xl bg-white border border-zinc-200 p-3 flex items-center justify-between mb-3">
        <div class="flex items-center gap-3">
          <span class="w-8 h-8 rounded-lg bg-zinc-100 border border-zinc-200 flex items-center justify-center text-zinc-700 text-xs font-bold">$</span>
          <span class="text-sm font-medium text-zinc-900">Price good — $269</span>
        </div>
        <span class="w-5 h-5 rounded-full bg-zinc-700 flex items-center justify-center text-white text-[10px]">✓</span>
      </div>
      <!-- Seller Memory card -->
      <div class="rounded-xl bg-white border border-zinc-200 p-3 flex items-center justify-between mb-6">
        <div class="flex items-center gap-3">
          <span class="w-8 h-8 rounded-lg bg-zinc-100 border border-zinc-200 flex items-center justify-center text-zinc-600 text-[10px] font-bold">M</span>
          <span class="text-sm font-medium text-zinc-900">Seller Memory — 3 past sales</span>
        </div>
        <button type="button" class="text-xs font-medium px-2.5 py-1.5 rounded-lg border border-zinc-200 text-zinc-600">Why?</button>
      </div>
    </main>

    <div class="p-5 pt-4 border-t border-zinc-200 shrink-0 bg-zinc-50">
      <a href="/flow-marketplaces.html" class="block w-full py-3.5 rounded-2xl bg-zinc-900 text-white font-semibold text-[15px] border border-zinc-800 text-center no-underline">
        Next
      </a>
    </div>
  </div>
  <script>
    document.addEventListener('keydown', function(e) {
      if (e.key !== 'ArrowLeft') return;
      if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement && document.activeElement.tagName || '')) return;
      e.preventDefault();
      history.back();
    });
  </script>
</body>
</html>
