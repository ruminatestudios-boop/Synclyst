<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard – SyncLyst AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #18181b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    a { color: #2563eb; font-weight: 600; text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #71717a; margin-top: 0.5rem; }
    .box {
      background: #fff;
      border: 1px solid #e4e4e7;
      border-radius: 12px;
      padding: 2rem;
      max-width: 24rem;
      text-align: center;
    }
    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: #18181b;
      color: #fff;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
    }
    .btn:hover { opacity: 0.9; text-decoration: none; }
    .links { margin-top: 1.5rem; font-size: 0.875rem; }
    .links a + a { margin-left: 0.5rem; }
  </style>
</head>
<body>
  <div class="box">
    <h1>SyncLyst Dashboard</h1>
    <p>Use the button below to open the dashboard.</p>
    <a href="/dashboard" class="btn">Open Dashboard</a>
    <div class="links">
      <a href="/">Home</a>
      <a href="/landing.html">Landing page</a>
    </div>
  </div>
</body>
</html>
