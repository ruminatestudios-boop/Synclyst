<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SyncLyst</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            serif: ['Source Serif 4', 'Georgia', 'serif'],
          },
        },
      },
    };
  </script>
  <style>
    .progress-dot { width: 6px; height: 6px; border-radius: 3px; background: #e4e4e7; }
    .progress-dot.current { width: 20px; background: #18181b; }
    .img-cell { aspect-ratio: 1; border-radius: 8px; background: #e4e4e7; }
  </style>
</head>
<body class="min-h-screen bg-zinc-50 font-sans text-zinc-900 antialiased">
  <div class="max-w-md mx-auto min-h-screen flex flex-col items-center justify-center px-5 py-8">
    <!-- Image placement: white card with light grey border -->
    <div class="w-full max-w-sm rounded-2xl bg-white border border-zinc-200 p-4 mb-8">
      <div class="grid grid-cols-4 gap-2">
        <div class="img-cell"></div>
        <div class="img-cell"></div>
        <div class="img-cell"></div>
        <div class="img-cell"></div>
        <div class="img-cell"></div>
        <div class="img-cell"></div>
        <div class="img-cell"></div>
        <div class="img-cell"></div>
        <div class="img-cell"></div>
        <div class="img-cell"></div>
        <div class="img-cell"></div>
        <div class="img-cell"></div>
      </div>
    </div>

    <!-- Logo / title (serif) -->
    <h1 class="font-serif text-4xl font-bold text-zinc-900 tracking-tight text-center">
      <span class="text-zinc-900">Aura</span><span class="text-zinc-600">Link</span>
    </h1>

    <!-- Tagline (lighter grey) -->
    <p class="mt-3 text-center text-sm text-zinc-500 max-w-xs font-sans">
      One photo. Listed everywhere.
    </p>

    <!-- Separator -->
    <span class="mt-6 block w-8 h-px bg-zinc-300"></span>

    <!-- Progress dot -->
    <div class="mt-6 flex justify-center gap-1.5">
      <span class="progress-dot current"></span>
    </div>

    <!-- CTA -->
    <a href="/onboard-1.html" class="mt-8 w-full max-w-xs py-3.5 rounded-2xl bg-zinc-900 text-white font-sans font-semibold text-[15px] hover:bg-zinc-800 transition-colors no-underline text-center">
      Continue
    </a>
  </div>
</body>
</html>
