<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=/landing.html?mode=scan" />
  <title>Capture | Listing Flow | AuraLink AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], serif: ['Source Serif 4', 'Georgia', 'serif'] },
        },
      },
    };
  </script>
  <style>
    .cam-frame { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12); }
    .progress-dot { width: 6px; height: 6px; border-radius: 3px; background: #e4e4e7; transition: all 0.2s; }
    .progress-dot.done { background: #a1a1aa; }
    .progress-dot.current { width: 20px; background: #18181b; }
  </style>
</head>
<body class="min-h-screen bg-zinc-50 font-sans text-zinc-900 antialiased">
  <p class="p-4 text-center text-sm text-zinc-600">Redirecting to <a href="/landing.html?mode=scan" class="font-medium text-zinc-900 underline">scan</a>…</p>
  <script>window.location.replace('/landing.html?mode=scan');</script>
  <div class="max-w-md mx-auto min-h-screen flex flex-col" style="display:none;">
    <div class="flex-1 flex flex-col min-h-0">
      <div class="flex-1 flex flex-col min-h-0 rounded-2xl overflow-hidden bg-zinc-950 mx-4">
        <div class="flex items-center justify-between px-4 py-3">
          <a href="/landing.html" class="w-9 h-9 rounded-lg bg-white/10 flex items-center justify-center text-white/70 text-sm font-medium">×</a>
          <span class="text-[10px] font-medium tracking-widest text-emerald-400/80 uppercase">Frame product</span>
          <button type="button" class="w-9 h-9 rounded-lg bg-white/10 flex items-center justify-center text-white/60 text-xs font-medium">Flash</button>
        </div>
        <div class="flex-1 relative flex items-center justify-center min-h-[260px]">
          <div class="absolute inset-0 bg-[radial-gradient(ellipse_60%_50%_at_50%_40%,#0f172a,#030712)]"></div>
          <div class="absolute inset-0 opacity-20" style="background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 24px 24px;"></div>
          <div class="relative w-28 h-28 rounded-xl border-2 border-white/20 cam-frame">
            <div class="absolute -top-px -left-px w-5 h-5 border-t-2 border-l-2 border-emerald-400/80 rounded-tl"></div>
            <div class="absolute -top-px -right-px w-5 h-5 border-t-2 border-r-2 border-emerald-400/80 rounded-tr"></div>
            <div class="absolute -bottom-px -left-px w-5 h-5 border-b-2 border-l-2 border-emerald-400/80 rounded-bl"></div>
            <div class="absolute -bottom-px -right-px w-5 h-5 border-b-2 border-r-2 border-emerald-400/80 rounded-br"></div>
          </div>
          <p class="absolute bottom-5 left-0 right-0 text-center text-[11px] font-medium tracking-widest text-white/40 uppercase">Point at product</p>
        </div>
        <div class="flex items-center justify-between px-6 py-5 bg-zinc-950">
          <button type="button" class="w-12 h-12 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-white/50 text-xs font-medium">Gallery</button>
          <a href="/flow-2.html" class="w-16 h-16 rounded-full bg-white border-2 border-white/30 flex items-center justify-center active:scale-95 transition-transform"></a>
          <button type="button" class="w-12 h-12 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-white/50 text-xs font-medium">Flip</button>
        </div>
      </div>
      <div class="px-5 pt-4 pb-6">
        <a href="/flow-2.html" class="block w-full py-3.5 rounded-2xl bg-zinc-900 text-white font-semibold text-[15px] hover:bg-zinc-800 transition-colors text-center no-underline">
          Continue
        </a>
        <p class="text-center mt-4">
          <a href="/flow-2.html" class="text-sm font-medium text-zinc-500 hover:text-zinc-900 underline">Skip for now</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
