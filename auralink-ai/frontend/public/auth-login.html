<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in | SyncLyst</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], serif: ['Source Serif 4', 'Georgia', 'serif'] },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-zinc-50 font-sans text-zinc-900 antialiased">
  <div class="max-w-md mx-auto min-h-screen flex flex-col px-5 py-8">
    <main class="flex-1 flex flex-col">
      <h1 class="font-serif text-2xl font-bold text-zinc-900 mb-1">Welcome back</h1>
      <p class="text-sm text-zinc-500 mb-8">Your AI is ready</p>

      <!-- Social -->
      <button type="button" class="w-full py-3.5 rounded-2xl bg-white border border-zinc-200 font-medium text-zinc-900 mb-3 flex items-center justify-center gap-2">
        <span class="w-5 h-5 rounded bg-zinc-200 flex items-center justify-center text-[10px] font-bold">A</span>
        Continue with Apple
      </button>
      <button type="button" class="w-full py-3.5 rounded-2xl bg-white border border-zinc-200 font-medium text-zinc-900 mb-6 flex items-center justify-center gap-2">
        <span class="w-5 h-5 rounded bg-zinc-200 flex items-center justify-center text-[10px] font-bold">G</span>
        Continue with Google
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-3 mb-6">
        <span class="flex-1 h-px bg-zinc-200"></span>
        <span class="text-xs font-medium text-zinc-400">or</span>
        <span class="flex-1 h-px bg-zinc-200"></span>
      </div>

      <!-- Fields -->
      <label class="block mb-4">
        <span class="block text-[11px] font-semibold uppercase tracking-wider text-zinc-500 mb-1.5">Email</span>
        <input type="email" placeholder="james@example.com" class="w-full py-3 px-4 rounded-xl bg-white border border-zinc-200 text-zinc-900 placeholder-zinc-400 text-[15px] focus:outline-none focus:border-zinc-400" />
      </label>
      <label class="block mb-4">
        <span class="block text-[11px] font-semibold uppercase tracking-wider text-zinc-500 mb-1.5">Password</span>
        <input type="password" placeholder="••••••••••" class="w-full py-3 px-4 rounded-xl bg-white border border-zinc-200 text-zinc-900 placeholder-zinc-400 text-[15px] focus:outline-none focus:border-zinc-400" />
      </label>
      <p class="text-right mb-6">
        <a href="#" class="text-sm font-medium text-zinc-900 underline hover:no-underline">Forgot password?</a>
      </p>

      <button type="button" class="w-full py-3.5 rounded-2xl bg-zinc-900 text-white font-semibold text-[15px] border border-zinc-800 hover:bg-zinc-800 transition-colors mb-6">
        Log in
      </button>

      <p class="text-center text-sm text-zinc-500">
        New here? <a href="/auth-signup.html" class="font-medium text-zinc-900 underline hover:no-underline">Create account</a>
      </p>
    </main>
  </div>
</body>
</html>
