<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're live! | SyncLyst</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], serif: ['Source Serif 4', 'Georgia', 'serif'] },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-zinc-50 font-sans text-zinc-900 antialiased">
  <div class="max-w-md mx-auto min-h-screen flex flex-col px-5 py-8">
    <main class="flex-1 flex flex-col items-center text-center">
      <!-- Success circle -->
      <div class="w-16 h-16 rounded-full bg-emerald-50 border border-emerald-200 flex items-center justify-center mb-6">
        <span class="text-2xl font-bold text-zinc-900">✓</span>
      </div>

      <h1 class="font-serif text-2xl font-bold text-zinc-900 mb-1">You're live!</h1>
      <p class="text-sm text-zinc-500 mb-8" id="success-count-text">Listed on 3 stores in 2.4 seconds</p>

      <!-- Store cards: filled from selected marketplaces -->
      <div class="w-full space-y-3 mb-6" id="success-stores-list"></div>

      <!-- Info box -->
      <div class="rounded-xl bg-zinc-100 border border-zinc-200 p-4 flex gap-3 text-left mb-8">
        <span class="w-6 h-6 rounded border border-zinc-300 flex items-center justify-center text-zinc-500 text-xs font-bold shrink-0">◆</span>
        <p class="text-sm text-zinc-700">AI saved this listing to your brain. It now knows more about your pricing sweet spot for electronics.</p>
      </div>

      <!-- Buttons -->
      <div class="w-full flex flex-col sm:flex-row gap-3">
        <a href="/dashboard-home.html" class="flex-1 py-3.5 rounded-2xl bg-zinc-900 text-white font-semibold text-[15px] border border-zinc-800 text-center no-underline">
          View listings
        </a>
        <a href="/?mode=scan" class="flex-1 py-3.5 rounded-2xl bg-white border border-zinc-200 text-zinc-600 font-semibold text-[15px] text-center no-underline hover:bg-zinc-50 transition-colors">
          List another
        </a>
      </div>
      <p class="text-xs text-zinc-500 mt-4">
        <a href="/stores-connect-shopify.html" class="font-medium text-zinc-700 hover:underline">Connect or reconnect Shopify</a>
      </p>
    </main>
  </div>
  <script>
    (function() {
      var STORAGE_KEY = 'auralink_selected_marketplaces';
      var meta = {
        tiktok_shop: { name: 'TikTok Shop', domain: 'tiktok.com', letter: 'T' },
        amazon: { name: 'Amazon', domain: 'amazon.com', letter: 'A' },
        shopify: { name: 'Shopify', domain: 'shopify.com', letter: 'S' },
        ebay: { name: 'eBay', domain: 'ebay.com', letter: 'E' },
        etsy: { name: 'Etsy', domain: 'etsy.com', letter: 'E' },
        depop: { name: 'Depop', domain: 'depop.com', letter: 'D' },
        walmart: { name: 'Walmart', domain: 'walmart.com', letter: 'W' },
        poshmark: { name: 'Poshmark', domain: 'poshmark.com', letter: 'P' },
        mercari: { name: 'Mercari', domain: 'mercari.com', letter: 'M' },
        vinted: { name: 'Vinted', domain: 'vinted.com', letter: 'V' }
      };
      function loadSelected() {
        try {
          var raw = sessionStorage.getItem(STORAGE_KEY);
          if (raw) { var arr = JSON.parse(raw); if (Array.isArray(arr) && arr.length > 0) return arr; }
        } catch (e) {}
        return ['amazon', 'shopify'];
      }
      var selected = loadSelected();
      var n = selected.length;
      var countEl = document.getElementById('success-count-text');
      if (countEl) countEl.textContent = n === 1 ? 'Listed on 1 store in 2.4 seconds' : 'Listed on ' + n + ' stores in 2.4 seconds';
      var container = document.getElementById('success-stores-list');
      if (container) {
        container.innerHTML = '';
        selected.forEach(function(id, i) {
          var m = meta[id];
          if (!m) return;
          var logoUrl = 'https://www.google.com/s2/favicons?domain=' + m.domain + '&sz=128';
          var badges = '<span class="text-[10px] font-semibold px-2.5 py-1 rounded-full bg-emerald-50 border border-emerald-200 text-emerald-800">Live</span>';
          if (id === 'tiktok_shop') badges = '<span class="text-[10px] font-semibold px-2.5 py-1 rounded-full bg-emerald-50 border border-emerald-200 text-emerald-800">Live</span><span class="text-[10px] font-semibold px-2.5 py-1 rounded-full bg-emerald-50 border border-emerald-200 text-emerald-800">Trending</span>';
          var row = document.createElement('div');
          row.className = 'rounded-xl bg-white border border-zinc-200 p-4 flex items-center justify-between';
          row.innerHTML = '<div class="flex items-center gap-3">' +
            '<span class="w-10 h-10 rounded-xl bg-zinc-100 border border-zinc-200 flex items-center justify-center overflow-hidden p-1.5">' +
              '<img src="' + logoUrl + '" alt="" class="w-6 h-6 object-contain" onerror="this.style.display=\'none\';var n=this.nextElementSibling;n&&n.classList.remove(\'hidden\');" />' +
              '<span class="text-zinc-600 text-sm font-bold hidden">' + m.letter + '</span></span>' +
            '<span class="font-semibold text-zinc-900">' + m.name + '</span></div>' +
            '<div class="flex gap-2">' + badges + '</div>';
          container.appendChild(row);
        });
      }
    })();
  </script>
</body>
</html>
